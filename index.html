<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SOVA Installer</title>

<script type="module" src="https://unpkg.com/esp-web-tools/dist/web/install-button.js?module"></script>
<script type="module" src="https://unpkg.com/esp-web-tools/dist/web/serial-terminal.js?module"></script>

<style>
body { background:#111; color:white; font-family:Arial; text-align:center; margin-top:50px; }
button{ font-size:20px; padding:12px 30px; border:none; border-radius:8px; background:#00aaff; color:white; cursor:pointer; }
progress{ width:80%; height:20px; margin-top:20px; }
h1{ margin-bottom:10px; }
</style>
</head>

<body>
<h1>SOVA ESP32-S3 Installer</h1>
<p>Connect your device via USB and press Install</p>

<esp-web-install-button id="installer" manifest="manifest.json">
  <button slot="activate">Install Firmware</button>
</esp-web-install-button>

<progress id="progress" value="0" max="100"></progress>
<br><br>

<esp-web-serial-terminal></esp-web-serial-terminal>

<script>
const installer = document.getElementById('installer');
const progress = document.getElementById('progress');

installer.addEventListener('progress', e => {
  progress.value = e.detail.percentage;
});
</script>

</body>
</html>
