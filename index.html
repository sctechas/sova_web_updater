<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SOVA Installer</title>

<!-- ESP Web Tools -->
<script type="module" src="https://unpkg.com/esp-web-tools/dist/web/install-button.js?module"></script>
<script type="module" src="https://unpkg.com/esp-web-tools/dist/web/serial-terminal.js?module"></script>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  margin-top:30px;
}

img.logo {
  width:250px;
  margin-bottom:20px;
}

h1 { margin:10px 0; }

button {
  font-size:22px;
  padding:15px 40px;
  border:none;
  border-radius:10px;
  background:#00aaff;
  color:white;
  cursor:pointer;
}

p { font-size:16px; }
</style>
</head>

<body>

<img src="logo.png" class="logo" alt="SOVA Logo">
<h1>SOVA Installer</h1>
<p>Press and hold IO1</p>
<p>Connect your device via USB</p>
<p>Press Install</p>
<p>Reboot your device</p>
<!-- Кнопка прошивки -->
<esp-web-install-button id="installer" manifest="manifest.json">
  <button slot="activate">Install Firmware</button>
</esp-web-install-button>
<p style="margin-top:20px;font-size:18px;color:#00ffaa;">
Devices flashed: <span id="counter">...</span>
</p>




<script>
const installer = document.getElementById('installer');
const counterEl = document.getElementById("counter");

// загрузка текущего значения
fetch("https://api.countapi.xyz/get/sova/flash")
.then(r => r.json())
.then(data => {
  counterEl.innerText = data.value || 0;
});

// увеличение после прошивки
installer.addEventListener('install-finished', async () => {

  const r = await fetch("https://api.countapi.xyz/hit/sova/flash");
  const data = await r.json();

  counterEl.innerText = data.value;

});
</script>
</body>
</html>
